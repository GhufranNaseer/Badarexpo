<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Navbar Replica</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
            border-bottom: 1px solid #eee;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: black;
            border-radius: 4px;
            position: relative;
        }

        .logo-box::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: 10px;
            left: 10px;
        }

        /* Menu */
        .menu {
            display: flex;
            gap: 30px;
            align-items: center;
            font-size: 15px;
            color: #555;
        }

        .menu span {
            cursor: pointer;
        }

        /* Right Buttons */
        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-dark {
            background: black;
            color: white;
        }

        .btn-light {
            background: #eee;
            color: black;
        }
    </style>
</head>

<body>

    <div class="navbar">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-box"></div>
        </div>

        <!-- Menu -->
        <div class="menu">
            <span>Product</span>
            <span>Solutions ▾</span>
            <span>Resources ▾</span>
            <span>Enterprise</span>
            <span>Pricing</span>
        </div>

        <!-- Buttons -->
        <div class="actions">
            <button class="btn btn-dark">Get Started</button>
            <button class="btn btn-light">Book a Demo</button>
        </div>

    </div>

</body>

</html>
